# Paths are relative to TestModels/ directory
base_dir: ..                     # STARS root: /home/watney/STARS
models_dir: .                    # TestModels directory itself
golden_dir: golden               # golden/ subdirectory

# Template for model configuration
# model_name: The name of the model (e.g., Simple, Simple_Composite)
model_template: &model_template
  # inputs section defines the input files for each format
  inputs:
    qm: "${model_name}.qm"              # ${model_name}/${model_name}.qm
    plantuml: "${model_name}.plantuml"  # ${model_name}/${model_name}.plantuml
    cameo: "${model_name}.xml"          # ${model_name}/${model_name}.xml
  backends: [c, c++, qf, fprime]
  test_driver: testDrv.txt               # ${model_name}/testDrv.txt
  golden:
    c: "${model_name}/c.txt"            # golden/${model_name}/c.txt
    c++: "${model_name}/cpp.txt"        # golden/${model_name}/cpp.txt
    qf: "${model_name}/qf.txt"          # golden/${model_name}/qf.txt
    fprime: "${model_name}/fprime.fppi" # golden/${model_name}/fprime.fppi

# Models configuration
models:
  # Simple model
  Simple:
    <<: *model_template
    # Any model-specific overrides can be added here
  
  # Simple_Composite model
  Simple_Composite:
    <<: *model_template
    # Any model-specific overrides can be added here

  # Actions model
  Actions:
    <<: *model_template
    # Any model-specific overrides can be added here
  
  # Arg_Actions model
  Arg_Actions:
    <<: *model_template
    # Any model-specific overrides can be added here
    backends: [c, c++, qf]
    test_driver: testDrv.txt               # ${model_name}/testDrv.txt
    golden:
      c: "${model_name}/c.txt"            # golden/${model_name}/c.txt
      c++: "${model_name}/cpp.txt"        # golden/${model_name}/cpp.txt
      qf: "${model_name}/qf.txt"          # golden/${model_name}/qf.txt

  # Arg_Actions_FP model
  Arg_Actions_FP:
    inputs:
      plantuml: "${model_name}.plantuml"  # ${model_name}/${model_name}.plantuml
    backends: [fprime]
    test_driver: testDrv.txt               # ${model_name}/testDrv.txt
    golden:
      fprime: "${model_name}/fprime.fppi" # golden/${model_name}/fprime.fppi

 # Complex_Composite model
  Complex_Composite:
    <<: *model_template
    # Format-specific golden files for fprime backend

  # Cases model
  Cases:
    <<: *model_template
    # Format-specific golden files for fprime backend
  
  # Simple_Junction model
  Simple_Junction:
    <<: *model_template
    # Format-specific golden files for fprime backend

  # Multiple_Actions model
  Multiple_Actions:
    <<: *model_template
    # Format-specific golden files for fprime backend

  # Complex_Junction model
  Complex_Junction:
    <<: *model_template
    # Format-specific golden files for fprime backend

  # String_Guards model
  String_Guards:
    <<: *model_template
    # Format-specific golden files for all backends

  # Transitions model
  Transitions:
    <<: *model_template
    # Format-specific golden files for all backends
    golden:
      c:
        qm: "${model_name}/c-qm.txt"
        plantuml: "${model_name}/c.txt"
        cameo: "${model_name}/c.txt"
      c++:
        qm: "${model_name}/cpp-qm.txt"
        plantuml: "${model_name}/cpp.txt"
        cameo: "${model_name}/cpp.txt"
      qf: "${model_name}/qf.txt"
      fprime: "${model_name}/fprime.fppi"
        
        
  # Cameo model
  Cameo:
    # Cameo model only has plantuml and cameo formats (no qm)
    inputs:
      plantuml: "${model_name}.plantuml"
      cameo: "${model_name}.xml"
    backends: [c, c++, qf, fprime]
    test_driver: testDrv.txt
    golden: 
      c: "${model_name}/c.txt"
      c++: "${model_name}/cpp.txt"
      qf: "${model_name}/qf.txt"
      fprime: "${model_name}/fprime.fppi"
   