[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    Simple: tests for Simple model
    Simple_Composite: tests for Simple_Composite model
    Simple_Junction: tests for Simple_Junction model
    Actions: tests for Actions model
    Arg_Actions: tests for Arg_Actions model
    Cases: tests for Cases model
    Complex_Composite: tests for Complex_Composite model
    Complex_Junction: tests for Complex_Junction model
    Multiple_Actions: tests for Multiple_Actions model
    Transitions: tests for Transitions model
    String_Guards: tests for String_Guards model
    Cameo: tests for Cameo model
    c: tests for C backend
    cpp: tests for C++ backend
    qf: tests for QF backend
    fprime: tests for Fprime backend
