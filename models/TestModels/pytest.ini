[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    simple: tests for simple model
    simple_composite: tests for simple_composite model
    actions: tests for actions model
    c: tests for C backend
    cpp: tests for C++ backend
    qf: tests for QF backend
    fprime: tests for Fprime backend
